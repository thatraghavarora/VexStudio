<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vex Studios</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        var firstSegment = path.split('/').filter(Boolean)[0] || '';
        var appRoutes = ['privacy', 'terms', 'internship', 'team'];
        var base = appRoutes.indexOf(firstSegment) >= 0 ? '/' : '/' + firstSegment + '/';
        var route = encodeURIComponent(path + search + hash);
        window.location.replace(base + '?route=' + route);
      })();
    </script>
  </head>
  <body></body>
</html>
